name = "violoop"
main = "src/worker/index.ts"
compatibility_date = "2026-07-11"

[assets]
directory = "dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Comma-separated allowed origins for /api/* CORS. Empty = reflect the request
# origin. Access protects the public entry point; this project intentionally does
# not restrict Origin separately.
VIOLOOP_ALLOWED_ORIGINS = ""
# Comma-separated provider host allowlist. Empty = allow any non-private
# HTTPS host.
VIOLOOP_ALLOWED_PROVIDER_HOSTS = ""
